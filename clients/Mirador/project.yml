name: Mirador
options:
  bundleIdPrefix: com.mirador
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1,2"   # 1 = iPhone, 2 = iPad (universal)
targets:
  Mirador:
    type: application
    platform: iOS
    sources:
      - path: Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.mirador.client
        GENERATE_INFOPLIST_FILE: "NO"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Mirador
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: true
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        # Allow ws:// to the Mac on the LAN / Tailscale (no TLS on the prototype service).
        # NOTE: do NOT add NSAllowsLocalNetworking here — its mere presence makes iOS ignore
        # NSAllowsArbitraryLoads, which then only exempts RFC-1918 LAN addresses and blocks
        # Tailscale's 100.64.0.0/10 (CGNAT) range with an ATS error.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: "Mirador connects to your Mac on the local network to stream and control its screen."
